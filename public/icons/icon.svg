<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- House body -->
  <rect x="148" y="248" width="216" height="168" rx="8" fill="white" opacity="0.95"/>

  <!-- Roof (triangle) -->
  <polygon points="256,100 110,262 402,262" fill="white"/>

  <!-- Door -->
  <rect x="220" y="336" width="72" height="80" rx="6" fill="#1e3a5f"/>

  <!-- Wi-Fi arcs (top-right of house) -->
  <g fill="none" stroke="#2563eb" stroke-linecap="round">
    <circle cx="348" cy="196" r="16" stroke-width="12" stroke-dasharray="25 75" stroke-dashoffset="-12"/>
    <circle cx="348" cy="196" r="30" stroke-width="10" stroke-dasharray="47 141" stroke-dashoffset="-23"/>
    <circle cx="348" cy="196" r="44" stroke-width="8"  stroke-dasharray="69 207" stroke-dashoffset="-34"/>
    <circle cx="348" cy="196" r="5"  fill="#2563eb" stroke="none"/>
  </g>
</svg>
